  <title>Chromium IME Next repro</title>
  <style>input{display:block;margin:12px 0;padding:8px;font-size:16px;width:95%}</style>
  
    <h3>Chromium IME Next repro — 3 inputs</h3>
    <input id="i1" placeholder="input 1">
    <input id="i2" placeholder="input 2">
    <input id="i3" placeholder="input 3">
    <pre id="log" style="height:160px;overflow:auto;background:#f6f8fa;padding:8px;border:1px solid #ddd"></pre>
    <script>
      const log = (s)=>{const el=document.getElementById('log'); el.textContent += s + '\n'; el.scrollTop = el.scrollHeight}
      const inputs = Array.from(document.querySelectorAll('input'))
      inputs.forEach((inp, idx) => {
        inp.addEventListener('keydown', (ev) => {
          log(`[keydown] id=${inp.id} key=${ev.key} time=${Date.now()}`)
          if (ev.key === 'Enter') {
            ev.preventDefault()
            const next = inputs[idx+1]
            if (next) {
              next.focus()
              log(`  -> focused ${next.id}`)
            } else {
              log('  -> no-next')
            }
          }
        })
      })
      window.addEventListener('load', ()=>document.getElementById('i1').focus())
    </script>
